name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Biome (lint + format check)
        run: npx biome ci .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test -- --run

  # Aplica migrations no projeto Supabase de staging.
  # Habilitar quando os secrets estiverem configurados no repositório (Fase 0).
  db-staging:
    name: Supabase migrations (staging)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Push migrations to staging
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          STAGING_PROJECT_REF: ${{ secrets.STAGING_PROJECT_REF }}
        run: |
          if [ -z "$STAGING_PROJECT_REF" ]; then
            echo "STAGING_PROJECT_REF não configurado — pulando (ver docs/plan/06-infra-deploy.md)."
            exit 0
          fi
          supabase link --project-ref "$STAGING_PROJECT_REF"
          supabase db push
